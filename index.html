<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SolidState">
<meta name="description" content="Interactive periodic table and solid state physics explorer — crystal structures, band gaps, semiconductor physics, fully offline.">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<title>Solid State · Periodic Table & Physics Explorer</title>
<style>
:root{
  --bg:#0a0e1a; --panel:#10162a; --panel2:#161e38; --line:#1f2a4a;
  --txt:#dce6f5; --dim:#7a8bb0; --cyan:#00e5ff; --amber:#ff6b35;
  --mono:ui-monospace,'Roboto Mono','SF Mono',Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --c-ak:#ff5370; --c-ae:#ffb74d; --c-tm:#ff6b35; --c-pt:#e0a458;
  --c-md:#00e5ff; --c-nm:#66e08a; --c-ha:#b388ff; --c-ng:#c792ea;
  --c-la:#5ed4b0; --c-ac:#8aa6ff; --cellfg:#f4f8ff; --rad:#ffd84d;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--txt);font-family:var(--sans);overscroll-behavior-y:none}
body{padding-bottom:calc(64px + env(safe-area-inset-bottom))}

/* ---------- header ---------- */
header{position:sticky;top:0;z-index:30;background:rgba(10,14,26,.92);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);padding:calc(8px + env(safe-area-inset-top)) 12px 8px;
  display:flex;align-items:center;gap:10px}
header::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan),var(--amber),transparent);opacity:.65}
header h1{font-family:var(--mono);font-size:15px;letter-spacing:.18em;font-weight:600;color:var(--cyan);flex:1}
header h1 small{color:var(--dim);letter-spacing:.1em;font-weight:400}
#semiToggle{font-family:var(--mono);font-size:11px;letter-spacing:.08em;padding:7px 12px;border-radius:7px;
  border:1px solid var(--line);background:var(--panel);color:var(--dim);cursor:pointer;min-height:32px}
#semiToggle.on{border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,.08);
  box-shadow:0 0 12px rgba(0,229,255,.35)}

/* ---------- periodic table ---------- */
#tableWrap{overflow-x:auto;padding:10px 8px 4px;-webkit-overflow-scrolling:touch}
#ptable{display:grid;grid-template-columns:repeat(18,minmax(44px,1fr));
  grid-auto-rows:minmax(48px,auto);gap:3px;min-width:858px;padding-bottom:6px}
.cell{position:relative;border:1px solid color-mix(in srgb,var(--cat) 50%,var(--line));border-radius:7px;
  background:linear-gradient(155deg,color-mix(in srgb,var(--cat) 30%,var(--panel)),color-mix(in srgb,var(--cat) 13%,var(--panel)));
  min-height:48px;min-width:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;
  cursor:pointer;transition:transform .12s,opacity .25s,box-shadow .2s,border-color .2s,background .2s;font-family:var(--mono)}
.cell .z{position:absolute;top:2px;left:4px;font-size:8px;z-index:1;color:color-mix(in srgb,var(--cat) 45%,var(--txt))}
.cell .sym{font-size:16px;font-weight:800;line-height:1;z-index:1;color:var(--cellfg);text-shadow:0 1px 3px rgba(0,0,0,.45)}
.cell .nm{font-size:7px;margin-top:2px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;z-index:1;
  color:color-mix(in srgb,var(--cat) 22%,var(--txt))}
.cell .ra{position:absolute;top:1px;right:3px;font-size:8px;z-index:1;color:#fff5cc;
  animation:radpulse 2.2s ease-in-out infinite}
@keyframes radpulse{0%,100%{opacity:.4}50%{opacity:1;text-shadow:0 0 7px #ffe14d}}
.cell:active{transform:scale(.95)}
.cell:active,.cell.selected{box-shadow:0 0 18px var(--cat),inset 0 0 14px rgba(255,255,255,.1);border-color:var(--cat)}
.cell.selected{background:linear-gradient(155deg,color-mix(in srgb,var(--cat) 48%,var(--panel)),color-mix(in srgb,var(--cat) 24%,var(--panel)))}
html[data-theme=light] .cell .sym{text-shadow:none}
.cell.dim{opacity:.12;pointer-events:auto}
.gap-label{display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:8px;
  color:var(--dim);border:1px dashed var(--line);border-radius:6px}
#legend{display:flex;flex-wrap:wrap;gap:6px;padding:10px 12px 16px;font-size:10px;font-family:var(--mono)}
#legend span{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;color:var(--txt);
  border:1px solid color-mix(in srgb,var(--lc,var(--line)) 50%,var(--line));
  background:color-mix(in srgb,var(--lc,var(--line)) 15%,var(--panel))}
#legend i{width:10px;height:10px;border-radius:50%;display:inline-block;box-shadow:0 0 5px var(--lc,transparent)}

/* ---------- semiconductor focus panel ---------- */
#semiPanel{display:none;margin:4px 12px 12px;border:1px solid rgba(0,229,255,.35);border-radius:12px;
  background:linear-gradient(180deg,rgba(0,229,255,.05),transparent);padding:14px}
#semiPanel.show{display:block}
#semiPanel h2{font-family:var(--mono);font-size:12px;letter-spacing:.15em;color:var(--cyan);margin-bottom:10px}
#semiPanel h3{font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--dim);margin:16px 0 8px}
.bar-row{display:grid;grid-template-columns:92px 1fr;gap:8px;align-items:center;margin-bottom:7px}
.bar-label{font-family:var(--mono);font-size:11px;text-align:right;color:var(--txt)}
.bar-track{background:var(--panel);border:1px solid var(--line);border-radius:4px;height:20px;position:relative;overflow:visible}
.bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,rgba(0,229,255,.25),var(--cyan));
  box-shadow:0 0 8px rgba(0,229,255,.4);display:flex;align-items:center;min-width:2px}
.bar-fill.indirect{background:linear-gradient(90deg,rgba(255,107,53,.25),var(--amber));box-shadow:0 0 8px rgba(255,107,53,.4)}
.bar-val{font-family:var(--mono);font-size:10px;white-space:nowrap;padding-left:6px;position:absolute;left:100%;top:3px;color:var(--dim)}
.bar-val b{color:var(--txt)}
.dirchip{font-size:8px;padding:1px 4px;border-radius:3px;margin-left:5px;font-family:var(--mono)}
.dirchip.d{background:rgba(0,229,255,.15);color:var(--cyan)}
.dirchip.i{background:rgba(255,107,53,.15);color:var(--amber)}
#compounds{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.comp-card{border:1px solid var(--line);border-radius:9px;padding:10px;background:var(--panel)}
.comp-card.star{border-color:var(--cyan);box-shadow:0 0 12px rgba(0,229,255,.25);background:rgba(0,229,255,.05)}
.comp-card h4{font-family:var(--mono);font-size:14px;color:var(--cyan)}
.comp-card .cname{font-size:9px;color:var(--dim);margin:2px 0 6px}
.comp-card dl{font-family:var(--mono);font-size:10px;line-height:1.7}
.comp-card dt{color:var(--dim);float:left;clear:left;margin-right:5px}
.comp-card dd{text-align:right}
.comp-card .use{font-size:9.5px;color:var(--dim);margin-top:6px;line-height:1.45;font-family:var(--sans)}

/* ---------- detail sheet ---------- */
#backdrop{position:fixed;inset:0;background:rgba(2,4,10,.6);opacity:0;pointer-events:none;transition:opacity .25s;z-index:40}
#backdrop.show{opacity:1;pointer-events:auto}
#sheet{position:fixed;left:0;right:0;bottom:0;z-index:50;background:var(--panel);
  border-top:1px solid var(--line);border-radius:18px 18px 0 0;max-height:82vh;overflow-y:auto;
  transform:translateY(102%);transition:transform .32s cubic-bezier(.32,.72,.25,1);
  padding-bottom:calc(20px + env(safe-area-inset-bottom));box-shadow:0 -10px 40px rgba(0,0,0,.6)}
#sheet.open{transform:translateY(0)}
.grab{width:38px;height:4px;border-radius:2px;background:var(--line);margin:10px auto 4px}
.sheet-head{display:flex;align-items:center;gap:16px;padding:8px 20px 4px}
.shellbox{position:relative;width:96px;height:96px;flex:none;display:flex;align-items:center;justify-content:center}
.shellbox .bigsym{font-family:var(--mono);font-size:34px;font-weight:700;z-index:2}
.ring{position:absolute;border-radius:50%;border:1px solid;opacity:0;animation:ringpulse 1.1s cubic-bezier(.2,.7,.3,1) forwards}
@keyframes ringpulse{0%{transform:scale(.25);opacity:0}45%{opacity:.85}100%{transform:scale(1);opacity:.28}}
.head-meta h2{font-size:19px;font-weight:600}
.head-meta .cat-chip{display:inline-block;font-family:var(--mono);font-size:9px;letter-spacing:.1em;
  padding:2px 7px;border-radius:4px;border:1px solid;margin-top:5px}
.head-meta .shells-txt{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:6px}
.sheet-tabs{display:flex;gap:6px;padding:10px 20px 0}
.sheet-tabs button{flex:1;font-family:var(--mono);font-size:11px;letter-spacing:.08em;padding:9px;border-radius:8px;
  border:1px solid var(--line);background:transparent;color:var(--dim);cursor:pointer;min-height:38px}
.sheet-tabs button.act{border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,.07)}
.sheet-body{padding:14px 20px 6px}
.drow{display:flex;justify-content:space-between;gap:14px;padding:8px 0;border-bottom:1px solid rgba(31,42,74,.6);font-size:13px}
.drow .k{color:var(--dim);font-size:12px}
.drow .v{font-family:var(--mono);text-align:right;word-break:break-word}
.drow .v.hl{color:var(--cyan)}
.apps-blk{margin-top:12px;padding:11px 13px;border:1px solid var(--line);border-radius:9px;background:var(--panel2);
  font-size:12.5px;line-height:1.55;color:var(--txt)}
.apps-blk .t{font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--dim);margin-bottom:5px}

/* ---------- physics view ---------- */
#physView{display:none;padding:12px 12px 8px}
#physView.show{display:block}
.pcard{border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:15px;margin-bottom:12px}
.pcard h2{font-family:var(--mono);font-size:12px;letter-spacing:.14em;color:var(--cyan);margin-bottom:3px}
.pcard .sub{font-size:11px;color:var(--dim);margin-bottom:11px;line-height:1.4}
.pcard .formula{font-family:var(--mono);font-size:13px;color:var(--amber);background:var(--panel2);
  border:1px solid var(--line);border-radius:7px;padding:8px 11px;margin-bottom:11px;overflow-x:auto;white-space:nowrap}
.inrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.inrow label{flex:1;min-width:110px;font-size:10px;color:var(--dim);font-family:var(--mono)}
.inrow input,.inrow select{display:block;width:100%;margin-top:4px;background:var(--bg);color:var(--txt);
  border:1px solid var(--line);border-radius:7px;padding:9px 10px;font-family:var(--mono);font-size:14px;min-height:42px}
.inrow input:focus,.inrow select:focus{outline:none;border-color:var(--cyan)}
.result{font-family:var(--mono);font-size:14px;padding:10px 12px;border-radius:8px;
  background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.3);color:var(--cyan);line-height:1.6}
.result small{color:var(--dim);font-size:11px}
input[type=range]{width:100%;accent-color:var(--cyan);min-height:30px}
.xtalbtns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.xtalbtns button{font-family:var(--mono);font-size:10.5px;padding:8px 11px;border-radius:7px;min-height:36px;
  border:1px solid var(--line);background:transparent;color:var(--dim);cursor:pointer}
.xtalbtns button.act{border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,.07)}
#xtalSvg{display:block;margin:0 auto;max-width:300px}
#xtalCaption{text-align:center;font-size:11px;color:var(--dim);margin-top:8px;line-height:1.5;font-family:var(--mono)}
.fline{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid rgba(31,42,74,.6);align-items:baseline}
.fline .fn{font-size:11px;color:var(--dim)}
.fline .fx{font-family:var(--mono);font-size:13.5px;color:var(--txt);text-align:right}

/* ---------- bottom nav ---------- */
nav{position:fixed;left:0;right:0;bottom:0;z-index:35;display:flex;background:rgba(13,18,36,.96);
  backdrop-filter:blur(10px);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;background:none;border:none;color:var(--dim);font-family:var(--mono);font-size:10px;
  letter-spacing:.12em;padding:10px 0 9px;cursor:pointer;min-height:52px}
nav button .ic{display:block;font-size:19px;margin-bottom:3px;font-family:var(--sans)}
nav button.act{color:var(--cyan)}
@media(min-width:900px){#ptable{min-width:0}}

/* ---------- light (day) theme ---------- */
html[data-theme=light]{--bg:#edf1f8;--panel:#ffffff;--panel2:#f2f5fb;--line:#c8d3e6;--txt:#15203a;
  --dim:#5b6b8f;--cyan:#007a9c;--amber:#cf4f1a;
  --c-ak:#d23a55;--c-ae:#c97f17;--c-tm:#cf4f1a;--c-pt:#a8731c;--c-md:#007a9c;--c-nm:#1d9450;
  --c-ha:#7448cc;--c-ng:#9438bf;--c-la:#168f6e;--c-ac:#4358cc;--cellfg:#0e1830;--rad:#b8860b}
html[data-theme=light] body{background:var(--bg)}
html[data-theme=light] header{background:rgba(237,241,248,.93)}
html[data-theme=light] nav{background:rgba(255,255,255,.96)}
html[data-theme=light] #backdrop{background:rgba(30,40,70,.35)}
#themeToggle,#langToggle{font-family:var(--mono);font-size:14px;padding:7px 10px;border-radius:7px;
  border:1px solid var(--line);background:var(--panel);color:var(--dim);cursor:pointer;min-height:32px}
#langToggle{font-size:11px;letter-spacing:.06em;font-weight:700}

/* ---------- table control bar ---------- */
#ctrlbar{padding:10px 12px 12px;border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,color-mix(in srgb,var(--panel) 60%,transparent),transparent)}

/* ---------- detail sheet additions ---------- */
.sect{font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:var(--cyan);
  margin:20px 0 9px;padding-top:13px;border-top:1px solid var(--line);display:flex;align-items:center;gap:8px}
.sect::before{content:"";width:8px;height:8px;border-radius:2px;background:currentColor;flex:none;
  box-shadow:0 0 7px currentColor}
.sheet-body>.sect:first-child{border-top:none;padding-top:4px;margin-top:6px}
.badges{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0 6px}
.badge{font-family:var(--mono);font-size:9.5px;letter-spacing:.05em;padding:5px 9px;border-radius:6px;
  border:1px solid var(--cyan);color:var(--cyan);background:rgba(0,229,255,.07);
  box-shadow:0 0 10px rgba(0,229,255,.22)}
.props{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:7px;margin:4px 0 6px}
.prop{border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:var(--panel2)}
.prop .pk{font-size:8.5px;color:var(--dim);font-family:var(--mono);letter-spacing:.08em}
.prop .pv{font-family:var(--mono);font-size:13px;margin-top:3px}
.prop .pv small{font-size:9px;color:var(--dim)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0 6px}
.chip{font-size:10.5px;padding:5px 10px;border-radius:14px;border:1px solid var(--line);
  color:var(--txt);background:var(--panel2)}
.magbadge{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.08em;
  padding:5px 10px;border-radius:6px;border:1px solid;margin:4px 0 6px}
.rabadge{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.08em;
  padding:5px 10px;border-radius:6px;border:1px solid var(--rad);color:var(--rad);
  background:color-mix(in srgb,var(--rad) 12%,transparent);margin:4px 0 6px}
.ranote{margin-top:6px;padding:11px 13px;border-left:3px solid var(--rad);border-radius:0 9px 9px 0;
  background:var(--panel2);font-size:12.5px;line-height:1.55}
.chain{display:flex;flex-wrap:wrap;align-items:center;gap:5px}
.chain .iso{font-family:var(--mono);font-size:11px;padding:4px 8px;border-radius:6px;
  border:1px solid color-mix(in srgb,var(--rad) 45%,var(--line));background:color-mix(in srgb,var(--rad) 12%,var(--panel));color:var(--txt)}
.chain .arr{font-family:var(--mono);font-size:8.5px;color:var(--rad);letter-spacing:.02em}
.chain .arr::after{content:" →"}
.hint{font-size:9.5px;color:var(--dim);font-family:var(--mono);text-align:center;margin-top:4px}
.unitbtn{font-family:var(--mono);font-size:11px;padding:4px 11px;border-radius:14px;cursor:pointer;
  border:1px solid var(--line);background:var(--panel2);color:var(--dim)}
.why{margin-top:6px;padding:12px 14px;border-left:3px solid var(--cyan);border-radius:0 9px 9px 0;
  background:var(--panel2);font-size:13px;line-height:1.6;font-style:italic}
.xtal3d{display:block;margin:4px auto;touch-action:none;cursor:grab;max-width:280px}

/* ---------- compare view ---------- */
#cmpView,#mapView{display:none;padding:12px 12px 8px}
#cmpView.show,#mapView.show{display:block}
.cmp-pick{display:flex;gap:8px;margin-bottom:10px}
.cmp-pick select{flex:1;background:var(--bg);color:var(--txt);border:1px solid var(--line);
  border-radius:7px;padding:9px 10px;font-family:var(--mono);font-size:13px;min-height:42px}
.cmp-pick button{font-family:var(--mono);font-size:12px;padding:0 16px;border-radius:7px;min-height:42px;
  border:1px solid var(--cyan);color:var(--cyan);background:rgba(0,229,255,.07);cursor:pointer}
.cmp-sel{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.cmp-sel .chip{cursor:pointer;border-color:var(--cyan);color:var(--cyan)}
.cmp-exp{display:flex;gap:8px;margin-bottom:10px}
.cmp-exp button{font-family:var(--mono);font-size:11px;letter-spacing:.05em;padding:7px 14px;border-radius:7px;
  border:1px solid var(--line);background:var(--panel2);color:var(--dim);cursor:pointer;min-height:36px}
.cmp-exp button:active{border-color:var(--cyan);color:var(--cyan)}
#cmpTableWrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table.cmp{border-collapse:collapse;font-family:var(--mono);font-size:11px;width:100%}
.cmp th,.cmp td{border:1px solid var(--line);padding:7px 9px;text-align:left;white-space:nowrap}
.cmp th{color:var(--cyan);font-weight:600;background:var(--panel2)}
.cmp td:first-child{color:var(--dim);position:sticky;left:0;background:var(--panel)}

/* ---------- materials map ---------- */
#mapSvg{display:block;width:100%;max-width:480px;margin:0 auto;touch-action:manipulation}
#mapInfo{margin-top:10px;min-height:48px}

/* ---------- search, quick access & table density ---------- */
#toolsRow{display:flex;gap:8px;align-items:center}
#searchBox{flex:1;background:var(--panel);color:var(--txt);border:1px solid var(--line);
  border-radius:8px;padding:9px 12px;font-family:var(--mono);font-size:13px;min-height:40px}
#searchBox:focus{outline:none;border-color:var(--cyan)}
#sizeBtn{font-family:var(--mono);font-size:12px;padding:0 13px;border-radius:8px;min-height:40px;
  border:1px solid var(--line);background:var(--panel);color:var(--dim);cursor:pointer}
#quickRow{display:flex;gap:6px;padding:8px 12px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.qchip{font-family:var(--mono);font-size:11px;padding:6px 11px;border-radius:14px;
  border:1px solid var(--line);background:var(--panel);color:var(--txt);cursor:pointer;white-space:nowrap}
.qchip.fav{border-color:var(--amber);color:var(--amber)}
.cell.searchdim{opacity:.08}
#tools2{display:flex;gap:8px;padding:8px 0 0;align-items:center}
#colorByLbl{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--dim)}
#colorBy{flex:1;background:var(--panel);color:var(--txt);border:1px solid var(--line);
  border-radius:8px;padding:9px 12px;font-family:var(--mono);font-size:12px;min-height:40px}
#filterBtn{font-family:var(--mono);font-size:11px;letter-spacing:.05em;padding:0 13px;border-radius:8px;min-height:40px;
  border:1px solid var(--line);background:var(--panel);color:var(--dim);cursor:pointer;white-space:nowrap}
#filterBtn.on{border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,.08)}
#filterPanel{display:none;margin:8px 0 0;border:1px solid var(--line);border-radius:10px;background:var(--panel2);padding:11px 12px}
#filterPanel.show{display:block}
#filterPanel .frow{display:flex;flex-wrap:wrap;gap:6px}
.fchip{font-family:var(--mono);font-size:10.5px;padding:6px 10px;border-radius:14px;
  border:1px solid var(--line);background:var(--panel2);color:var(--txt);cursor:pointer;white-space:nowrap}
.fchip.on{border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,.1)}
#filterPanel .frange{display:flex;align-items:center;gap:8px;margin-top:9px;flex-wrap:wrap}
#filterPanel select,#filterPanel input{background:var(--bg);color:var(--txt);border:1px solid var(--line);
  border-radius:7px;padding:7px 9px;font-family:var(--mono);font-size:12px;min-height:36px}
#filterPanel input{width:78px}
#filterCount{font-family:var(--mono);font-size:10.5px;color:var(--cyan);margin-top:9px}
#heatScale{display:none;align-items:center;gap:8px;padding:6px 14px 0;font-family:var(--mono);font-size:9.5px;color:var(--dim)}
#heatScale.show{display:flex}
#heatBar{flex:1;height:9px;border-radius:5px;min-width:80px}
#ptable.size-s{grid-template-columns:repeat(18,minmax(34px,1fr));min-width:680px}
#ptable.size-s .cell{min-width:34px;min-height:38px}
#ptable.size-s .cell .nm{display:none}
#ptable.size-l{grid-template-columns:repeat(18,minmax(58px,1fr));min-width:1110px}
#favBtn{position:absolute;top:8px;right:14px;background:none;border:none;font-size:24px;
  color:var(--amber);cursor:pointer;padding:6px;line-height:1}
.sheet-head{position:relative}

/* ---------- update banner ---------- */
#updBanner{position:fixed;left:12px;right:12px;bottom:calc(64px + env(safe-area-inset-bottom) + 8px);
  z-index:60;display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;
  background:var(--panel2);border:1px solid var(--cyan);box-shadow:0 4px 24px rgba(0,0,0,.5);
  font-size:12px;font-family:var(--mono)}
#updBanner[hidden]{display:none}
#updBanner button{margin-left:auto;font-family:var(--mono);font-size:11px;padding:7px 13px;
  border-radius:7px;border:1px solid var(--cyan);color:var(--cyan);background:rgba(0,229,255,.08);cursor:pointer}
#updBanner #updClose{margin-left:0;border-color:var(--line);color:var(--dim);padding:7px 10px}

/* ---------- quiz ---------- */
.qopt{display:block;width:100%;text-align:left;font-family:var(--mono);font-size:12.5px;
  padding:11px 13px;margin-bottom:7px;border-radius:8px;border:1px solid var(--line);
  background:var(--panel2);color:var(--txt);cursor:pointer;min-height:42px}
.qopt.ok{border-color:#4ade80;color:#4ade80;background:rgba(74,222,128,.08)}
.qopt.bad{border-color:#ff5370;color:#ff5370;background:rgba(255,83,112,.08)}
#quizScore{font-family:var(--mono);font-size:11px;color:var(--dim)}
#quizNext{font-family:var(--mono);font-size:11px;letter-spacing:.08em;padding:9px 16px;border-radius:8px;
  border:1px solid var(--cyan);color:var(--cyan);background:rgba(0,229,255,.07);cursor:pointer;min-height:40px}
</style>

 [5,'s',2],[4,'d',10],[5,'p',6],[6,'s',2],[4,'f',14],[5,'d',10],[6,'p',6],[7,'s',2],[5,'f',14],[6,'d',10],[7,'p',6]];
const CFG_EXC={24:'3d5 4s1',29:'3d10 4s1',41:'4d4 5s1',42:'4d5 5s1',44:'4d7 5s1',45:'4d8 5s1',
 46:'4d10 5s0',47:'4d10 5s1',57:'4f0 5d1',58:'4f1 5d1',64:'4f7 5d1',78:'4f14 5d9 6s1',79:'4f14 5d10 6s1',

function electronConfig(z){
  const fill={};let left=z;
  for(const[n,l,cap]of SUBSHELLS){if(left<=0)break;const t=Math.min(cap,left);fill[n+l]=t;left-=t;}
  if(CFG_EXC[z])for(const part of CFG_EXC[z].split(' ')){
    const m=part.match(/^(\d[spdf])(\d+)$/);fill[m[1]]=+m[2];}
  const parts=[],shells={};
  for(const[n,l]of SUBSHELLS){const k=n+l,v=fill[k];if(v){parts.push(k+sup(v));shells[n]=(shells[n]||0)+v;}}
  return{cfg:parts.join(' '),shells:Object.keys(shells).sort().map(n=>shells[n])};
}
const SUPS={'0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹'};

function shellSVG(z,col){

function miniTrend(e,prop,label,unit,col){
  const peers=ELEMENTS.filter(x=>x.period===e.period&&x.group!=null&&x[prop]!=null);
  if(e[prop]==null||peers.length<3)return'';
  const W=284,H=104,L=34,R=12,T=10,B=20;
  const gs=peers.map(x=>x.group),vs=peers.map(x=>x[prop]);
  const gmn=Math.min(...gs),gmx=Math.max(...gs),vmn=Math.min(...vs),vmx=Math.max(...vs);
  const X=g=>L+(g-gmn)/Math.max(gmx-gmn,1)*(W-L-R),Y=v=>T+(vmx-v)/Math.max(vmx-vmn,1e-9)*(H-T-B);
  const pts=peers.map(x=>`${X(x.group).toFixed(1)},${Y(x[prop]).toFixed(1)}`).join(' L');
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;margin:2px auto;max-width:${W}px" aria-label="${label} trend">`;
  s+=`<line x1="${L}" y1="${H-B}" x2="${W-R}" y2="${H-B}" stroke="var(--line)" stroke-width="0.6"/>`;
  s+=`<text x="${L-4}" y="${Y(vmx)+3}" font-size="8" text-anchor="end" fill="var(--dim)" font-family="monospace">${(+vmx).toFixed(unit==='pm'?0:1)}</text>`;
  s+=`<text x="${L-4}" y="${Y(vmn)+3}" font-size="8" text-anchor="end" fill="var(--dim)" font-family="monospace">${(+vmn).toFixed(unit==='pm'?0:1)}</text>`;
  s+=`<path d="M${pts}" fill="none" stroke="var(--dim)" stroke-width="1.3" stroke-opacity="0.7"/>`;
  for(const x of peers){const cur=x.z===e.z;
    s+=`<circle cx="${X(x.group).toFixed(1)}" cy="${Y(x[prop]).toFixed(1)}" r="${cur?4.5:2.4}" fill="${cur?col:'var(--dim)'}"/>`;
    if(cur)s+=`<text x="${X(x.group).toFixed(1)}" y="${Y(x[prop])-7}" font-size="8.5" text-anchor="middle" fill="${col}" font-family="monospace">${x.symbol}</text>`;}

  return s+'</svg>'+`<div class="hint">${label} ${LANG==='it'?'lungo il periodo':'across period'} ${e.period} · ${unit}</div>`;
}

/* Bragg calculator */
function calcBragg(){
  const L=+document.getElementById('brL').value,d=+document.getElementById('brD').value,
    n=+document.getElementById('brN').value,out=document.getElementById('brOut');
  const s=n*L/(2*d);
  if(!L||!d||!n||s<=0){out.textContent='enter λ, d, n';return;}
  if(s>1){out.innerHTML='no diffraction — nλ &gt; 2d <small>(sin θ would exceed 1)</small>';return;}
  const th=Math.asin(s)*180/Math.PI;
  out.innerHTML=`θ = <b>${th.toFixed(3)}°</b> &nbsp;·&nbsp; 2θ = ${(2*th).toFixed(3)}° <small>(detector angle)</small>`;
}
['brL','brD','brN'].forEach(id=>document.getElementById(id).addEventListener('input',calcBragg));

/* Rayleigh calculator */
function calcRay(){
  const L=+document.getElementById('ryL').value,NA=+document.getElementById('ryNA').value,
    out=document.getElementById('ryOut');
  if(!L||!NA){out.textContent='enter λ and NA';return;}
  out.innerHTML=`d = <b>${(0.61*L/NA).toFixed(1)} nm</b> <small>minimum resolvable half-pitch (k₁ = 0.61)</small>`;

/* radioactive decay calculator */
function calcDecay(){
  const T=+document.getElementById('hlT').value,t=+document.getElementById('hlt').value,
    u=document.getElementById('hlU').value,out=document.getElementById('hlOut');
  if(!T||T<=0||t<0||!isFinite(t)){out.textContent='enter a positive half-life and elapsed time';return;}
  const n=t/T,frac=Math.pow(0.5,n),pct=frac*100;
  const show=pct>=0.01?pct.toFixed(pct>=10?1:2)+'%'
    :(pct>0?pct.toExponential(2)+'%':'≈0%');
  out.innerHTML=`remaining = <b>${show}</b> <small>after ${n.toFixed(2)} half-lives (${t} ${u})</small><br>`+
    `decayed = ${(100-pct).toFixed(pct>=10?1:4)}% &nbsp;·&nbsp; λ = ${(Math.LN2/T).toExponential(2)} ${u}⁻¹`;
}
['hlT','hlt'].forEach(id=>document.getElementById(id).addEventListener('input',calcDecay));
document.getElementById('hlU').addEventListener('change',calcDecay);

  Ge:{Eg:0.66,ni300:2.0e13,Eg0:0.7437,va:4.77e-4,vb:235},
  GaAs:{Eg:1.424,ni300:2.1e6,Eg0:1.519,va:5.41e-4,vb:204},
  InP:{Eg:1.344,ni300:1.3e7,Eg0:1.4206,va:4.906e-4,vb:327},
  GaN:{Eg:3.39,ni300:1.9e-10,Eg0:3.507,va:9.09e-4,vb:830}};

function egT(m,T){return m.Eg0!=null?m.Eg0-m.va*T*T/(T+m.vb):m.Eg}
function niCalc(m,T){
  const Eg3=egT(m,300),EgT=egT(m,T);
  const C=m.ni300/(Math.pow(300,1.5)*Math.exp(-Eg3/(2*KB*300)));
  return C*Math.pow(T,1.5)*Math.exp(-EgT/(2*KB*T));
}
function sciHTML(v){
  if(v<=0||!isFinite(v))return'—';
  const ex=Math.floor(Math.log10(v)),man=v/Math.pow(10,ex);
  return`${man.toFixed(2)} × 10${sup(ex)}`;
}
function drawArr(curMat,curT){
  const svg=document.getElementById('arrSvg');if(!svg)return;
  const L=44,R=12,T0=10,B=34,W=320,H=180;
  const xu=u=>L+(u-1.6)/(5-1.6)*(W-L-R),yl=lg=>T0+(16-lg)/(16-(-12))*(H-T0-B);
  let s='';
  for(const lg of[-10,-5,0,5,10,15])s+=`<line x1="${L}" y1="${yl(lg)}" x2="${W-R}" y2="${yl(lg)}" stroke="var(--line)" stroke-width="0.4"/>
    <text x="${L-5}" y="${yl(lg)+3}" font-size="8" text-anchor="end" fill="var(--dim)" font-family="monospace">${lg}</text>`;
  for(const u of[2,3,4,5])s+=`<text x="${xu(u)}" y="${H-B+12}" font-size="8" text-anchor="middle" fill="var(--dim)" font-family="monospace">${u}</text>`;
  s+=`<text x="${(L+W-R)/2}" y="${H-6}" font-size="9" text-anchor="middle" fill="var(--dim)" font-family="monospace">1000/T (K⁻¹)</text>
  <text x="10" y="${(T0+H-B)/2}" font-size="9" text-anchor="middle" fill="var(--dim)" font-family="monospace" transform="rotate(-90 10 ${(T0+H-B)/2})">log₁₀ nᵢ (cm⁻³)</text>`;
  for(const[name,m]of Object.entries(NI_MAT)){
    if(name==='GaN')continue;
    const pts=[];
    for(let T=200;T<=625;T+=12){
      const lg=Math.log10(niCalc(m,T));
      if(lg<-12)continue;
      pts.push(`${xu(1000/T).toFixed(1)},${yl(lg).toFixed(1)}`);
    }
    const cur=name===curMat;
    s+=`<path d="M${pts.join(' L')}" fill="none" stroke="${cur?'var(--cyan)':'var(--dim)'}" stroke-width="${cur?2:0.9}" stroke-opacity="${cur?1:0.55}"/>`;
    if(pts.length){const[px,py]=pts[0].split(',');
      s+=`<text x="${+px+3}" y="${py}" font-size="8.5" fill="${cur?'var(--cyan)':'var(--dim)'}" font-family="monospace">${name}</text>`;}
  }
  const mc=NI_MAT[curMat],lgc=Math.log10(niCalc(mc,curT));
  if(lgc>-12)s+=`<circle cx="${xu(1000/curT)}" cy="${yl(lgc)}" r="4.5" fill="var(--amber)"/>`;
  svg.innerHTML=s;
}

/* ternary alloy designer (Vegard + bowing, 300 K) */
function calcVegard(){
  const mat=document.getElementById('vgMat').value,x=+document.getElementById('vgX').value;
  document.getElementById('vgXv').textContent=x.toFixed(2);
  let Eg,a,direct,note='';
  if(mat==='InGaAs'){
    Eg=1.424-1.615*x+0.555*x*x;
    a=5.6533+0.4054*x;
    direct=true;
    const mm=((a-5.8688)/5.8688*100);
    note=`lattice mismatch to InP: ${mm>0?'+':''}${mm.toFixed(2)}%${Math.abs(mm)<0.1?' — <b>lattice-matched ✓</b>':''}`;
  }else{
    direct=x<0.45;
    Eg=direct?1.424+1.247*x:1.911+0.005*x+0.245*x*x;
    a=5.6533+0.0078*x;
    note=`mismatch to GaAs: +${((a-5.6533)/5.6533*100).toFixed(3)}% — strain-free DBRs at any x`;
  }
  document.getElementById('vgOut').innerHTML=
    `E𝗀 = <b>${Eg.toFixed(3)} eV</b> <span class="dirchip ${direct?'d':'i'}">${direct?'DIRECT':'INDIRECT'}</span>
     &nbsp;·&nbsp; λ𝗀 = ${(1239.84/Eg).toFixed(0)} nm &nbsp;·&nbsp; a = ${a.toFixed(4)} Å<br>
     <small>${note}</small>`;
}

/* doping & Fermi level */
const DOPE={Si:{Nc:2.8e19,Nv:1.04e19,mu:[1400,450]},Ge:{Nc:1.04e19,Nv:6.0e18,mu:[3900,1900]},
  GaAs:{Nc:4.7e17,Nv:7.0e18,mu:[8500,400]},InP:{Nc:5.7e17,Nv:1.1e19,mu:[5400,200]},
  GaN:{Nc:2.3e18,Nv:4.6e19,mu:[1200,30]}};
function calcDope(){
  const name=document.getElementById('dpMat').value,typ=document.getElementById('dpType').value,
    s=+document.getElementById('dpN').value,N=Math.pow(10,s),
    d=DOPE[name],m=NI_MAT[name],kT=KB*300,ni=niCalc(m,300);
  document.getElementById('dpNv').textContent=s.toFixed(1);
  const maj=N,min=ni*ni/N;
  const ef=typ==='d'?kT*Math.log(d.Nc/maj):kT*Math.log(d.Nv/maj);
  const mu=typ==='d'?d.mu[0]:d.mu[1];
  const rho=1/(1.602e-19*maj*mu);
  const deg=ef<3*kT?' <small style="color:var(--amber)">⚠ degenerate — Boltzmann approx. breaking down</small>':'';
  document.getElementById('dpOut').innerHTML=
    (typ==='d'
      ?`n ≈ <b>${sciHTML(maj)}</b> cm⁻³ · p = ${sciHTML(min)} cm⁻³<br>E꜀ − E_F = <b>${(ef*1000).toFixed(0)} meV</b>${deg}`
      :`p ≈ <b>${sciHTML(maj)}</b> cm⁻³ · n = ${sciHTML(min)} cm⁻³<br>E_F − Eᵥ = <b>${(ef*1000).toFixed(0)} meV</b>${deg}`)+
    `<br>ρ ≈ <b>${rho.toPrecision(3)} Ω·cm</b> <small>(μ = ${mu} cm²/V·s, full ionisation, 300 K)</small>`;
}
['dpMat','dpType'].forEach(id=>document.getElementById(id).addEventListener('change',calcDope));
document.getElementById('dpN').addEventListener('input',calcDope);

/* quiz */
let quizScore=0,quizTotal=0,quizStreak=0,quizAns=false;
function rnd(n){return Math.floor(Math.random()*n)}
function pick(a){return a[rnd(a.length)]}
function shuffled(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=rnd(i+1);[b[i],b[j]]=[b[j],b[i]]}return b}
const QUIZ_POOL=ELEMENTS.filter(e=>e.z<=92);
const QUIZ_FAMOUS=[1,3,6,8,13,14,15,22,24,26,27,28,29,30,31,32,33,34,47,49,50,74,79,82,83].map(z=>ELEMENTS[z-1]);
function genQuiz(){
  const t=rnd(5);
  if(t===0){
    const e=pick(QUIZ_POOL),wrong=new Set();
    while(wrong.size<3){const w=pick(QUIZ_POOL).name;if(w!==e.name)wrong.add(w)}
    return{q:`Which element has the symbol “${e.symbol}”?`,correct:e.name,opts:shuffled([e.name,...wrong])};
  }
  if(t===1){
    const cand=QUIZ_FAMOUS.filter(e=>['FCC','BCC','HCP','DC'].includes(e.crystalStructure));
    const e=pick(cand),names=['FCC','BCC','HCP','DC'].map(k=>XTALS[k][0]);
    return{q:`Crystal structure of ${e.name}?`,correct:XTALS[e.crystalStructure][0],opts:shuffled(names)};
  }
  if(t===2){
    const mats=[{f:'Si',bg:1.12},{f:'Ge',bg:0.66},...COMPOUNDS.map(c=>({f:c.f,bg:c.bg}))];
    const m=pick(mats),wrong=new Set();
    while(wrong.size<3){const w=pick(mats).bg+' eV';if(w!==m.bg+' eV')wrong.add(w)}
    return{q:`Band gap of ${m.f} at 300 K?`,correct:m.bg+' eV',opts:shuffled([m.bg+' eV',...wrong])};
  }
  if(t===3){
    const e=pick(QUIZ_FAMOUS.filter(x=>x.bandType&&x.bandType!=='U'));
    return{q:`Electrically, ${e.name} is a …?`,correct:BANDTYPE[e.bandType][0],
      opts:shuffled(Object.values(BANDTYPE).slice(0,4).map(b=>b[0]))};
  }
  const e=pick(QUIZ_FAMOUS.filter(x=>MAG[x.z]));
  return{q:`Magnetic ordering of ${e.name}?`,correct:MAGCLS[MAG[e.z][0]][0],
    opts:shuffled(Object.values(MAGCLS).map(m=>m[0]))};
}
function quizNext(){
  const Q=genQuiz();quizAns=false;
  document.getElementById('quizQ').textContent=Q.q;
  document.getElementById('quizOpts').innerHTML=
    Q.opts.map(o=>`<button class="qopt" data-v="${o}">${o}</button>`).join('');
  document.getElementById('quizOpts').querySelectorAll('.qopt').forEach(b=>
    b.addEventListener('click',()=>{
      if(quizAns)return;quizAns=true;quizTotal++;
      const right=b.dataset.v===Q.correct;
      if(right){quizScore++;quizStreak++;b.classList.add('ok');}
      else{quizStreak=0;b.classList.add('bad');
        document.getElementById('quizOpts').querySelectorAll('.qopt')
          .forEach(x=>{if(x.dataset.v===Q.correct)x.classList.add('ok')});}
      document.getElementById('quizScore').textContent=
        `score ${quizScore}/${quizTotal} · streak ${quizStreak}`;
    }));
  document.getElementById('quizScore').textContent=
    quizTotal?`score ${quizScore}/${quizTotal} · streak ${quizStreak}`:'answer to start scoring';
}
document.getElementById('quizNext').addEventListener('click',quizNext);

/* ---------- interactive 3D crystal structure engine ----------
   orthographic projection with drag-to-rotate (pointer events) */
function corners(){const a=[];for(const x of[0,1])for(const y of[0,1])for(const z of[0,1])a.push([x,y,z]);return a}
function fccPts(){return[...corners(),[.5,.5,0],[.5,.5,1],[.5,0,.5],[.5,1,.5],[0,.5,.5],[1,.5,.5]]}
function tetraPts(){return[[.25,.25,.25],[.75,.75,.25],[.75,.25,.75],[.25,.75,.75]]}
function cubeEdges(){
  const c=corners(),E=[];
  for(let i=0;i<8;i++)for(let j=i+1;j<8;j++)
    if(c[i].filter((v,k)=>v!==c[j][k]).length===1)E.push([c[i],c[j]]);
  return E;
}
function hexPts(){
  const pts=[],H=0.92;
  for(const z of[0,1]){
    for(let k=0;k<6;k++){const a=Math.PI*k/3;
      pts.push([.5+.46*Math.cos(a),.5+.46*Math.sin(a),z*H]);}
    pts.push([.5,.5,z*H]);
  }
  for(let k=0;k<3;k++){const a=Math.PI*(2*k/3)+Math.PI/6;
    pts.push([.5+.27*Math.cos(a),.5+.27*Math.sin(a),H/2]);}
  return pts;
}
function hexEdges(){
  const E=[],H=0.92,v=k=>{const a=Math.PI*k/3;return[.5+.46*Math.cos(a),.5+.46*Math.sin(a)]};
  for(const z of[0,H])for(let k=0;k<6;k++){
    const[ax,ay]=v(k),[bx,by]=v((k+1)%6);E.push([[ax,ay,z],[bx,by,z]]);}
  for(let k=0;k<6;k++){const[ax,ay]=v(k);E.push([[ax,ay,0],[ax,ay,H]]);}
  return E;
}
const STRUCTS={
  FCC:{cap:'FCC — 8 corners + 6 face centres · 4 atoms/cell · packing 74% · Cu, Al, Au, Ni, Pt',
    atoms:()=>fccPts().map(p=>[p,0]),edges:cubeEdges},
  BCC:{cap:'BCC — 8 corners + body centre · 2 atoms/cell · packing 68% · Fe, W, Mo, Nb, Ta',
    atoms:()=>[...corners(),[.5,.5,.5]].map(p=>[p,0]),edges:cubeEdges},
  SC:{cap:'SIMPLE CUBIC — 8 corners · 1 atom/cell · packing 52% · only Po',
    atoms:()=>corners().map(p=>[p,0]),edges:cubeEdges},
  DC:{cap:'DIAMOND CUBIC — FCC + identical basis at (¼,¼,¼) · 8 atoms/cell · Si, Ge, C, α-Sn',
    atoms:()=>[...fccPts().map(p=>[p,0]),...tetraPts().map(p=>[p,0])],edges:cubeEdges},
  ZB:{cap:'ZINCBLENDE — two interpenetrating FCC sublattices, different species · GaAs, InP, InSb',
    atoms:()=>[...fccPts().map(p=>[p,0]),...tetraPts().map(p=>[p,1])],edges:cubeEdges},
  HCP:{cap:'HCP — hexagonal close-packed, ABAB stacking · packing 74% · Mg, Ti, Zn, Co, Zr',
    atoms:()=>hexPts().map(p=>[p,0]),edges:hexEdges}
};
const COORD={FCC:12,HCP:12,BCC:8,SC:6,DC:4,ZB:4};
function rot3([x,y,z],ax,ay){
  x-=.5;y-=.5;z-=.46;
  let x1=x*Math.cos(ay)+z*Math.sin(ay),z1=-x*Math.sin(ay)+z*Math.cos(ay);
  let y1=y*Math.cos(ax)-z1*Math.sin(ax),z2=y*Math.sin(ax)+z1*Math.cos(ax);
  return[x1,y1,z2];
}
function renderXtal3d(svg,key,ax,ay){
  const def=STRUCTS[key];if(!def)return;
  const W=+svg.viewBox.baseVal.width,Hh=+svg.viewBox.baseVal.height;
  const cx=W/2,cy=Hh/2,s=Math.min(W,Hh)*0.62;
  const P=p=>{const[x,y,z]=rot3(p,ax,ay);return[cx+x*s,cy+y*s*0.92-z*s*0.18,z]};
  let g='';
  for(const[a,b]of def.edges()){
    const p=P(a),q=P(b);
    g+=`<line x1="${p[0].toFixed(1)}" y1="${p[1].toFixed(1)}" x2="${q[0].toFixed(1)}" y2="${q[1].toFixed(1)}" stroke="var(--line)" stroke-width="1"/>`;}
  const atoms=def.atoms().map(([p,sp])=>{const q=P(p);return{x:q[0],y:q[1],d:q[2],sp}}).sort((a,b)=>a.d-b.d);
  for(const a of atoms){
    const col=a.sp?'#ff6b35':'#00e5ff',r=(a.sp?7.5:9)*(1+a.d*0.25);
    g+=`<circle cx="${a.x.toFixed(1)}" cy="${a.y.toFixed(1)}" r="${r.toFixed(1)}" fill="${col}" fill-opacity="${(0.55+a.d*0.4).toFixed(2)}" stroke="${col}" stroke-width="1"/>`;}
  svg.innerHTML=g;

function initXtal3d(svg,key,onstate){
  let ax=-0.45,ay=0.62,drag=null,raf=0;
  const draw=()=>{raf=0;renderXtal3d(svg,key,ax,ay)};
  const queue=()=>{if(!raf)raf=requestAnimationFrame(draw)};
  svg.addEventListener('pointerdown',ev=>{drag=[ev.clientX,ev.clientY];svg.setPointerCapture(ev.pointerId)});
  svg.addEventListener('pointermove',ev=>{
    if(!drag)return;
    ay+=(ev.clientX-drag[0])*0.012;ax+=(ev.clientY-drag[1])*0.012;
    ax=Math.max(-1.5,Math.min(1.5,ax));
    drag=[ev.clientX,ev.clientY];queue();});
  const end=()=>{drag=null};
  svg.addEventListener('pointerup',end);svg.addEventListener('pointercancel',end);
  draw();
  return{setKey(k){key=k;queue()}};
}

const HEAT_PROPS={
  none:{en:'— Heatmap off —',it:'— Heatmap off —'},
  atomicRadius:{en:'Atomic radius',it:'Raggio atomico',unit:'pm'},
  electronegativity:{en:'Electronegativity',it:'Elettronegatività',unit:'χ'},
  meltingPoint:{en:'Melting point',it:'Punto di fusione',unit:'K'},
  density:{en:'Density',it:'Densità',unit:'g/cm³'},
  abundance:{en:'Crustal abundance',it:'Abbondanza crostale',unit:'ppm',log:true}};
let heatProp='none',heatRange=null;
const HEAT_STOPS=['#3b1f6b','#3d4fb5','#1f9bd6','#3fc98a','#d4d44a','#ff6b35'];
function hx(c){return[parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)]}
function rampColor(t){
  t=Math.max(0,Math.min(1,t));
  const f=t*(HEAT_STOPS.length-1),i=Math.min(Math.floor(f),HEAT_STOPS.length-2),fr=f-i;
  const a=hx(HEAT_STOPS[i]),b=hx(HEAT_STOPS[i+1]);
  return`rgb(${Math.round(a[0]+(b[0]-a[0])*fr)},${Math.round(a[1]+(b[1]-a[1])*fr)},${Math.round(a[2]+(b[2]-a[2])*fr)})`;
}
function computeHeatRange(){
  if(heatProp==='none'){heatRange=null;return;}
  const log=!!HEAT_PROPS[heatProp].log;
  const vals=ELEMENTS.map(e=>e[heatProp]).filter(v=>v!=null&&(!log||v>0)).map(v=>log?Math.log10(v):v);
  heatRange={min:Math.min(...vals),max:Math.max(...vals),log};
}
function heatColor(e){
  if(!heatRange)return null;
  let v=e[heatProp];if(v==null||(heatRange.log&&v<=0))return null;
  const tv=heatRange.log?Math.log10(v):v;
  return rampColor((tv-heatRange.min)/Math.max(heatRange.max-heatRange.min,1e-9));
}
function renderHeatScale(){
  const p=HEAT_PROPS[heatProp],log=p.log;
  document.getElementById('heatBar').style.background=
    `linear-gradient(90deg,${[0,.2,.4,.6,.8,1].map(rampColor).join(',')})`;
  const fmtV=x=>{const v=log?Math.pow(10,x):x;return v>=100?v.toFixed(0):v>=1?v.toFixed(1):v.toExponential(0);};
  document.getElementById('heatMin').textContent=fmtV(heatRange.min);
  document.getElementById('heatMax').textContent=fmtV(heatRange.max)+' '+(p.unit||'');
}

  for(let a=3;a<=6;a+=0.5)s+=`<line x1="${x(a)}" y1="${T}" x2="${x(a)}" y2="${H-B}" stroke="var(--line)" stroke-width="0.4"/>
    <text x="${x(a)}" y="${H-B+14}" font-size="9" text-anchor="middle" fill="var(--dim)" font-family="monospace">${a.toFixed(1)}</text>`;
  s+=`<text x="${(L+W-R)/2}" y="${H-8}" font-size="10" text-anchor="middle" fill="var(--dim)" font-family="monospace">lattice constant a (Å)</text>
  <text x="14" y="${(T+H-B)/2}" font-size="10" text-anchor="middle" fill="var(--dim)" font-family="monospace" transform="rotate(-90 14 ${(T+H-B)/2})">band gap Eg (eV)</text>`;
  s+=`<line x1="${x(5.869)}" y1="${T}" x2="${x(5.869)}" y2="${H-B}" stroke="#00e5ff" stroke-width="0.7" stroke-dasharray="3 5" opacity="0.5"/>
  <text x="${x(5.869)+4}" y="${T+10}" font-size="8.5" fill="var(--cyan)" font-family="monospace">InP ecosystem</text>`;
  MAPPTS.forEach((p,i)=>{
    const c=p.d?'#00e5ff':'#ff6b35';
    s+=`<g class="mappt" data-i="${i}" style="cursor:pointer">
      <circle cx="${x(p.a)}" cy="${y(p.bg)}" r="11" fill="${c}" fill-opacity="0.15"/>
      <circle cx="${x(p.a)}" cy="${y(p.bg)}" r="5" fill="${c}"/>
      <text x="${x(p.a)+9}" y="${y(p.bg)-7}" font-size="10" fill="var(--txt)" font-family="monospace">${p.f}</text></g>`;
  });
  document.getElementById('mapView').innerHTML=`<div class="pcard">
    <h2>◬ SEMICONDUCTOR MATERIALS MAP</h2>
    <div class="sub">The classic Eg vs lattice-constant chart. Materials on the same vertical line can be grown
    on each other defect-free (lattice matching) — that is why the InP column owns telecom photonics.
    <span style="color:var(--cyan)">cyan = direct gap</span> · <span style="color:var(--amber)">amber = indirect</span>. Tap a point.</div>
    <svg id="mapSvg" viewBox="0 0 ${W} ${H}"> ${s}</svg>
    <div id="mapInfo" class="apps-blk" style="display:none"></div></div>`;
  document.getElementById('mapSvg').addEventListener('click',ev=>{
    const g=ev.target.closest('.mappt');if(!g)return;
    const p=MAPPTS[+g.dataset.i],inf=document.getElementById('mapInfo');
    inf.style.display='block';
    inf.innerHTML=`<div class="t">${p.f} · ${p.bg} eV ${p.d?'DIRECT':'INDIRECT'} · a = ${p.a} Å</div>
      ${p.app}<br><span style="color:var(--dim)">Wafer ecosystem: ${p.wafer}</span>`;
  });
}

/* ---------- favourites & recents ---------- */
function load(k,d){try{return JSON.parse(localStorage.getItem(k))||d}catch(_){return d}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(_){}}
let favs=load('sshet-favs',[]),recents=load('sshet-recents',[]);
const quickRow=document.getElementById('quickRow');
function renderQuick(){
  const items=[...favs.map(z=>({z,f:1})),...recents.filter(z=>!favs.includes(z)).map(z=>({z,f:0}))];
  quickRow.style.display=items.length?'':'none';
  quickRow.innerHTML=items.map(it=>
    `<button class="qchip${it.f?' fav':''}" data-z="${it.z}">${it.f?'★ ':''}${ELEMENTS[it.z-1].symbol} · ${elName(ELEMENTS[it.z-1])}</button>`).join('');
}
quickRow.addEventListener('click',ev=>{
  const b=ev.target.closest('.qchip');if(b)openSheet(ELEMENTS[+b.dataset.z-1]);
});
document.getElementById('favBtn').addEventListener('click',()=>{
  if(!curElem)return;
  const z=curElem.z;
  favs=favs.includes(z)?favs.filter(x=>x!==z):[...favs,z];
  save('sshet-favs',favs);
  document.getElementById('favBtn').textContent=favs.includes(z)?'★':'☆';
  renderQuick();
});

/* ---------- element search ---------- */
const searchBox=document.getElementById('searchBox');
function searchMatches(q){
  return ELEMENTS.filter(e=>e.symbol.toLowerCase().startsWith(q)||
    e.name.toLowerCase().includes(q)||(IT_NAMES[e.z]||'').toLowerCase().includes(q)||String(e.z)===q);
}
searchBox.addEventListener('input',()=>{
  const q=searchBox.value.trim().toLowerCase();
  const hit=q?new Set(searchMatches(q).map(e=>e.z)):null;
  document.querySelectorAll('.cell').forEach(c=>
    c.classList.toggle('searchdim',!!hit&&!hit.has(+c.dataset.z)));
});
searchBox.addEventListener('keydown',ev=>{
  if(ev.key!=='Enter')return;
  const m=searchMatches(searchBox.value.trim().toLowerCase());
  if(m.length){openSheet(m[0]);searchBox.blur();}
});

/* ---------- table density ---------- */
const SIZES=['','size-s','size-l'],SIZE_LBL=['M','S','L'];
let sizeIdx=+load('sshet-size',0)||0;
function applySize(){
  ptable.className=SIZES[sizeIdx];
  document.getElementById('sizeBtn').textContent=SIZE_LBL[sizeIdx];
  save('sshet-size',sizeIdx);
}
document.getElementById('sizeBtn').addEventListener('click',()=>{
  sizeIdx=(sizeIdx+1)%3;applySize();
});

/* ---------- bottom nav ---------- */
const tableView=document.getElementById('tableView');
const VIEWS={table:tableView,phys:physView,cmp:cmpView,map:document.getElementById('mapView')};
function showView(v){
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('act',b.dataset.view===v));
  for(const[k,el]of Object.entries(VIEWS)){
    if(k==='table')el.style.display=v==='table'?'':'none';
    else el.classList.toggle('show',k===v);
  }
  closeSheet();
  if(v!=='table')try{history.replaceState(null,'','#v='+v)}catch(_){}
}
document.querySelector('nav').addEventListener('click',ev=>{
  const b=ev.target.closest('button');if(b)showView(b.dataset.view);
});

/* ---------- init ---------- */
buildTable();
calcBragg();calcRay();calcDecay();calcNi();calcVegard();calcDope();cvShow(0.80);
physXtal=initXtal3d(document.getElementById('xtalSvg'),'FCC');
document.getElementById('xtalCaption').textContent=STRUCTS.FCC.cap;
drawBandK('Si');drawDevice('mos');quizNext();
renderCompare();renderMap();renderQuick();applySize();applyLang();
/* deep links: #e=49 opens an element, #v=phys|cmp|map opens a view */
(function(){
  const h=location.hash;
  let m=h.match(/^#e=(\d+)$/);
  if(m&&+m[1]>=1&&+m[1]<=118){openSheet(ELEMENTS[+m[1]-1]);return;}
  m=h.match(/^#v=(phys|cmp|map)$/);
  if(m)showView(m[1]);
})();

/* swipe-down to close sheet */
let tY=null;
sheet.addEventListener('touchstart',e=>{tY=e.touches[0].clientY},{passive:true});
sheet.addEventListener('touchend',e=>{
  if(tY!=null&&e.changedTouches[0].clientY-tY>70&&sheet.scrollTop<=0)closeSheet();tY=null;},{passive:true});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSheet()});

/* ---------- service worker + update notification ----------
   The banner must appear only when a NEW worker replaces an EXISTING one.
   On first install (or after iOS evicts the worker) controllerchange also
   fires via clients.claim() — hadController filters that case out. */
document.getElementById('updReload').addEventListener('click',()=>location.reload());
document.getElementById('updClose').addEventListener('click',()=>
  document.getElementById('updBanner').hidden=true);
if('serviceWorker'in navigator){
  const hadController=!!navigator.serviceWorker.controller;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(hadController)document.getElementById('updBanner').hidden=false;
  });
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
